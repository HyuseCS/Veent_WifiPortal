name: Publish images

# Post-merge: build + push images to GHCR on every push to staging or main.
on:
  push:
    branches: [staging, main]

permissions:
  contents: read
  packages: write # push to GHCR with the built-in GITHUB_TOKEN

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: admin, build_args: 'APP=admin', target: '' }
          - { name: customer, build_args: 'APP=customer', target: '' }
          - { name: locator, build_args: 'APP=locator', target: '' }
          - { name: migrate, build_args: '', target: 'migrate' }
    steps:
      - uses: actions/checkout@v4

      # GHCR needs a lowercase image path; owner/repo may contain uppercase.
      - name: Compute image ref
        id: img
        run: echo "repo=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: ${{ matrix.build_args }}
          target: ${{ matrix.target }}
          # Immutable {branch}-{sha} tag + a moving {branch} tag (staging | main).
          tags: |
            ghcr.io/${{ steps.img.outputs.repo }}-${{ matrix.name }}:${{ github.ref_name }}-${{ github.sha }}
            ghcr.io/${{ steps.img.outputs.repo }}-${{ matrix.name }}:${{ github.ref_name }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max
