<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Radius by Parafiber — Location Finder</title>
		<script>
			// Set light/dark before first paint to avoid a flash: a *valid* saved choice
			// ('light'/'dark') wins, else follow the OS preference. matchMedia stays the
			// fallback even when localStorage is unavailable (private mode).
			try {
				var saved = localStorage.getItem('radius-locator-theme');
				var prefersDark = matchMedia('(prefers-color-scheme: dark)').matches;
				document.documentElement.dataset.theme =
					saved === 'light' || saved === 'dark' ? saved : prefersDark ? 'dark' : 'light';
			} catch (e) {
				document.documentElement.dataset.theme =
					matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
			}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
