<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Veent WiFi Portal — API Explorer</title>
	</head>
	<body>
		<!--
			Self-contained API reference. Open this file directly in a browser
			(no server needed) to browse every endpoint. Spec is embedded below;
			Scalar renders it from the CDN.

			Form actions (dashboard/top-up, admin block/kick) and page load()s are
			NOT REST endpoints, so they're summarized in the spec description rather
			than listed as paths. See docs/API.md for the full picture.
		-->
		<script id="api-reference" type="application/json">
			{
				"openapi": "3.1.0",
				"info": {
					"title": "Veent WiFi Portal API",
					"version": "0.1.0",
					"description": "REST endpoints for the captive portal (customer, :5173) and admin dashboard (:5174). Auth is via better-auth session cookies (`veent-portal.*` / `veent-admin.*`). NON-REST surfaces not listed here: customer form actions `dashboard?/startFreeTime`, `dashboard?/buyTier`, `top-up?/checkout`; admin actions `users?/block|unblock|kick`; admin page loaders for users/dashboard. See docs/API.md."
				},
				"servers": [
					{ "url": "http://localhost:5173", "description": "Customer portal" },
					{ "url": "http://localhost:5174", "description": "Admin dashboard" }
				],
				"tags": [
					{ "name": "Customer · Network" },
					{ "name": "Customer · Payments" },
					{ "name": "Auth" },
					{ "name": "Admin" }
				],
				"paths": {
					"/api/network/grant": {
						"post": {
							"tags": ["Customer · Network"],
							"summary": "Start an access session (free or paid tier)",
							"description": "Authenticated. No packageId → Free Time (429 if in 12h cooldown). With packageId → spends the tier's creditCost then grants (402 if short). 403 if the account is blocked. Server: :5173.",
							"requestBody": {
								"required": true,
								"content": {
									"application/json": {
										"schema": {
											"type": "object",
											"required": ["macAddress"],
											"properties": {
												"macAddress": { "type": "string", "example": "AA:BB:CC:DD:EE:FF" },
												"packageId": { "type": "integer", "example": 5 }
											}
										}
									}
								}
							},
							"responses": {
								"200": { "description": "Granted", "content": { "application/json": { "schema": { "$ref": "#/components/schemas/GrantResult" } } } },
								"400": { "description": "macAddress missing" },
								"401": { "description": "Not authenticated" },
								"402": { "description": "Insufficient credit balance" },
								"403": { "description": "Account blocked" },
								"404": { "description": "Package not found" },
								"429": { "description": "Free time in cooldown" }
							}
						}
					},
					"/api/network/revoke": {
						"post": {
							"tags": ["Customer · Network"],
							"summary": "Expire due sessions (cron)",
							"description": "Revokes every active session past its expiry and re-blocks the MAC. Auth via the `x-cron-secret` header. Server: :5173.",
							"parameters": [
								{ "name": "x-cron-secret", "in": "header", "required": true, "schema": { "type": "string" } }
							],
							"responses": {
								"200": { "description": "Done", "content": { "application/json": { "schema": { "type": "object", "properties": { "ok": { "type": "boolean" }, "revoked": { "type": "integer" } } } } } },
								"401": { "description": "Bad or missing cron secret" }
							}
						}
					},
					"/api/webhooks/payment": {
						"post": {
							"tags": ["Customer · Payments"],
							"summary": "Payment gateway webhook (source of truth for credits)",
							"description": "Raw body verified via the provider (Maya). On a paid event, credits the buyer EXACTLY ONCE (idempotent on the gateway txn id). referenceId = `${userId}:${packageId}`. Server: :5173. NOTE: Maya is stubbed — verifyWebhook currently throws (400) until wired.",
							"requestBody": {
								"required": true,
								"content": { "application/json": { "schema": { "type": "object", "description": "Raw provider webhook payload" } } }
							},
							"responses": {
								"200": { "description": "Processed / ignored", "content": { "application/json": { "schema": { "type": "object", "properties": { "ok": { "type": "boolean" }, "credited": { "type": "boolean" }, "balance": { "type": "number" }, "ignored": { "type": "boolean" } } } } } },
								"400": { "description": "Verification failed / malformed referenceId" },
								"404": { "description": "Package not found" }
							}
						}
					},
					"/api/auth/sign-up/email": {
						"post": {
							"tags": ["Auth"],
							"summary": "Register (better-auth)",
							"description": "Creates a user and signs in (sets the session cookie). Customer :5173 uses customer_* tables; admin :5174 uses admin_* tables.",
							"requestBody": {
								"required": true,
								"content": { "application/json": { "schema": { "type": "object", "required": ["email", "password", "name"], "properties": { "name": { "type": "string" }, "email": { "type": "string" }, "password": { "type": "string", "minLength": 8 } } } } }
							},
							"responses": { "200": { "description": "Signed up; Set-Cookie session token" } }
						}
					},
					"/api/auth/sign-in/email": {
						"post": {
							"tags": ["Auth"],
							"summary": "Log in (better-auth)",
							"requestBody": {
								"required": true,
								"content": { "application/json": { "schema": { "type": "object", "required": ["email", "password"], "properties": { "email": { "type": "string" }, "password": { "type": "string" } } } } }
							},
							"responses": { "200": { "description": "Signed in; Set-Cookie session token" }, "401": { "description": "Invalid credentials" } }
						}
					},
					"/api/connected": {
						"get": {
							"tags": ["Admin"],
							"summary": "Connected-users live stream (SSE)",
							"description": "Server-Sent Events stream of ActiveSession[] — snapshot on connect, then every 5s (business rule #5). Authenticated staff only. Server: :5174.",
							"responses": {
								"200": { "description": "text/event-stream of `data: ActiveSession[]`", "content": { "text/event-stream": { "schema": { "type": "string" } } } },
								"401": { "description": "Not authenticated" }
							}
						}
					}
				},
				"components": {
					"schemas": {
						"GrantResult": {
							"type": "object",
							"properties": {
								"ok": { "type": "boolean" },
								"mode": { "type": "string", "enum": ["free", "tier"] },
								"balance": { "type": "number" },
								"session": {
									"type": "object",
									"properties": {
										"id": { "type": "integer" },
										"macAddress": { "type": "string" },
										"status": { "type": "string" },
										"expiresAt": { "type": "string", "format": "date-time" }
									}
								}
							}
						},
						"ActiveSession": {
							"type": "object",
							"properties": {
								"mac": { "type": "string" },
								"package": { "type": "string" },
								"timeLeft": { "type": "string", "example": "14:52" },
								"tone": { "type": "string", "enum": ["online", "warning", "blocked"] },
								"status": { "type": "string" }
							}
						}
					}
				}
			}
		</script>
		<script src="https://cdn.jsdelivr.net/npm/@scalar/api-reference"></script>
	</body>
</html>
