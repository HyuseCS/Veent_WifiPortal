<!--
  MikroTik Hotspot login page → redirect to the Veent portal.

  Drop this in the router's hotspot files folder (Files → hotspot/login.html),
  replacing the default login.html. RouterOS substitutes the $(...) variables at
  serve time, so the device lands on the portal with its MAC + the originally
  requested URL, which the SvelteKit app captures (see lib/server/portal.ts).

  Set PORTAL_BASE to the portal's LAN address. Update it if the IP changes.
  The portal host MUST be in the walled garden (IP → Hotspot → Walled Garden IP
  List) or trapped devices can't reach it.

  *** PRODUCTION MUST USE HTTPS ***
  The URLs below are http://<LAN-IP> for LOCAL DEV ONLY. In production the portal
  mints session cookies over OPEN guest WiFi — on plain HTTP they are sniffable off
  the air (sidejacking), and the cookie `Secure` flag keys off the ORIGIN protocol.
  So in prod:
    - serve the portal over https on a real domain (valid public cert),
    - set ORIGIN=https://<portal-domain> (validateEnv hard-fails otherwise),
    - point the redirect below at https://<portal-domain>,
    - walled-garden the HTTPS portal origin (see docs/mikrotik/walled-garden.md).
  Rationale + threat model: docs/SECURITY_2b_session-continuity.md (control C1).
-->
<html>
<head>
	<meta http-equiv="refresh" content="0; url=http://10.0.0.147:5173/?mac=$(mac)&ip=$(ip)&link-login-only=$(link-login-only)&link-orig=$(link-orig)&ssid=$(ssid)" />
	<title>Connecting…</title>
</head>
<body>
	<p>Redirecting to the WiFi portal…</p>
	<p>If nothing happens, <a href="http://10.0.0.147:5173/?mac=$(mac)&link-orig=$(link-orig)">tap here</a>.</p>
</body>
</html>
