<!--
  MikroTik Hotspot login page → redirect to the Veent portal.
  *** TEAMMATE DEV-HOST VARIANT: portal served from 10.0.0.196 (not .147). ***

  Drop this in the router's hotspot files folder (Files → hotspot/login.html),
  replacing the default login.html. RouterOS substitutes the $(...) variables at
  serve time, so the device lands on the portal with its MAC + the originally
  requested URL, which the SvelteKit app captures (see lib/server/portal.ts).

  This is the same as login.html but points at 10.0.0.196:5173. Upload whichever
  matches the machine currently hosting the customer portal. The portal host MUST
  be in the walled garden (IP → Hotspot → Walled Garden IP List) or trapped
  devices can't reach it.
-->
<html>
<head>
	<meta http-equiv="refresh" content="0; url=http://10.0.0.196:5173/?mac=$(mac)&ip=$(ip)&link-login-only=$(link-login-only)&link-orig=$(link-orig)&ssid=$(ssid)" />
	<title>Connecting…</title>
</head>
<body>
	<p>Redirecting to the WiFi portal…</p>
	<p>If nothing happens, <a href="http://10.0.0.196:5173/?mac=$(mac)&link-orig=$(link-orig)">tap here</a>.</p>
</body>
</html>
